[general]
import = ["custom.toml"]

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/usr/bin/zsh"

[font]
size = 18.0

[font.bold]
# family = "JetBrainsMono Nerd Font Mono"
family = "Iosevka Term Nerd Font Mono"
style = "Bold"

[font.bold_italic]
# family = "JetBrainsMono Nerd Font Mono"
family = "Iosevka Term Nerd Font Mono"
style = "Bold Italic"

[font.italic]
# family = "JetBrainsMono Nerd Font Mono"
family = "Iosevka Term Nerd Font Mono"
style = "Italic"

[font.normal]
# family = "JetBrainsMono Nerd Font Mono"
family = "Iosevka Term Nerd Font Mono"
style = "SemiBold"
